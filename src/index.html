<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CC Launcher</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <!-- Main view -->
    <div id="main-view">
      <div class="top-bar">
        <div class="search-bar">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/>
        </svg>
        <input type="text" id="search" placeholder="Search projects..." autocomplete="off" spellcheck="false">
        <span class="search-count" id="search-count"></span>
        <button class="search-action" id="refresh-btn" title="Refresh">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/>
            <path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/><path d="M16 16h5v5"/>
          </svg>
        </button>
        <button class="search-action" id="settings-btn" title="Settings">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
      <div class="list" id="project-list"></div>
      <div id="empty" class="empty hidden">
        <p>No projects found</p>
        <p class="sub">Add scan directories in settings</p>
      </div>
      <div id="loading" class="empty hidden"><div class="spinner"></div></div>
    </div>

    <!-- Settings view -->
    <div id="settings-view" class="hidden">
      <div class="settings-topbar">
        <button id="settings-back" class="back-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
          Projects
        </button>
        <span class="settings-title">Settings</span>
      </div>
      <div class="settings-body">
        <section>
          <label>Terminal</label>
          <select id="terminal-select" class="sel"></select>
        </section>
        <section>
          <label>Launch Flags</label>
          <div id="flag-chips" class="chips"></div>
          <div id="flag-dropdowns" class="drops"></div>
          <input type="text" id="extra-flags-input" class="field" placeholder="Custom flags..." spellcheck="false">
          <div class="preview" id="computed-flags"></div>
        </section>
        <section>
          <label>Scan Directories</label>
          <div id="scan-dirs-list"></div>
          <div class="add-row">
            <input type="text" id="new-dir-input" class="field" placeholder="/path/to/projects" spellcheck="false">
            <button id="add-dir-btn" class="add-btn">Add</button>
          </div>
        </section>
        <section>
          <label>Scan Depth</label>
          <div class="range-row">
            <input type="range" id="scan-depth" min="1" max="6" step="1">
            <span id="depth-value">3</span>
          </div>
        </section>
      </div>
    </div>
  </div>
  <script src="main.js"></script>
</body>
</html>
